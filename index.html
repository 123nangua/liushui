<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智析流水 - 智能记账演示版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        #pieChart { height: 250px; width: 100%; }
        .bill-item:hover { background-color: #f9fafb; }
        .emotion-message {
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .cat-feedback {
            animation: popUp 0.3s ease-out;
        }
        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#fef2f2] p-5">
<div class="container mx-auto max-w-3xl">
    <!-- 情绪提示框 -->
    <div id="emotionMessage" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-white rounded-2xl p-4 shadow-lg z-50 hidden emotion-message">
        <div class="flex items-center gap-3">
            <div class="text-2xl">🎉</div>
            <div id="emotionText" class="font-medium text-gray-800"></div>
        </div>
    </div>

    <!-- 猫咪反馈框 -->
    <div id="catFeedback" class="fixed left-1/2 transform -translate-x-1/2 top-1/4 bg-white rounded-2xl p-4 shadow-lg z-50 hidden cat-feedback">
        <div class="flex items-center gap-3">
            <div class="text-2xl">🐱</div>
            <div id="catFeedbackText" class="font-medium text-gray-800"></div>
        </div>
    </div>

    <!-- 头部卡片 -->
    <div class="bg-white rounded-3xl p-6 mb-6 shadow-sm">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-pink-500 rounded-2xl flex items-center justify-center text-white">
                    <i class="fas fa-wallet text-lg"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">智析流水</h1>
            </div>
            <div class="flex items-center gap-2 bg-yellow-100 px-4 py-2 rounded-2xl">
                <i class="fas fa-coins text-yellow-500"></i>
                <span class="font-bold text-gray-700">喵币: <span id="totalCoins">0</span></span>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-4">
            <div class="text-center">
                <div class="text-sm text-gray-500 mb-1">总收入</div>
                <div class="text-2xl font-bold text-green-600">¥<span id="totalIncome">0</span></div>
            </div>
            <div class="text-center">
                <div class="text-sm text-gray-500 mb-1">总支出</div>
                <div class="text-2xl font-bold text-red-500">¥<span id="totalExpense">0</span></div>
            </div>
            <div class="text-center">
                <div class="text-sm text-gray-500 mb-1">结余</div>
                <div class="text-2xl font-bold text-blue-600">¥<span id="balance">0</span></div>
            </div>
        </div>
    </div>

    <!-- 猫咪与房子区域 -->
    <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center gap-2">
            <i class="fas fa-home text-pink-500"></i>
            <span>我的小窝</span>
        </h2>
        <div class="flex flex-col md:flex-row gap-6">
            <!-- 左侧猫咪区域 -->
            <div class="flex-1 bg-gray-50 rounded-2xl p-6 text-center">
                <div class="text-6xl mb-2" id="cat">🐱</div>
                <div class="font-semibold text-gray-700 mb-1">小花</div>
                <div class="text-sm text-gray-500 mb-4">亲密值: <span id="catAffection">0</span></div>
                <div class="text-3xl mb-2">🥣</div>
                <div class="text-sm text-gray-500">猫碗</div>
            </div>
            <!-- 右侧道具区域 -->
            <div class="flex-1">
                <h3 class="font-semibold mb-3 text-gray-700 flex items-center gap-2">
                    <i class="fas fa-gift text-pink-500"></i>
                    <span>我的道具</span>
                </h3>
                <div id="houseItems" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 记账表单 -->
    <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center gap-2">
            <i class="fas fa-plus-circle text-pink-500"></i>
            <span>添加账单</span>
        </h2>
        <div class="flex gap-3 mb-4">
            <button type="button" class="flex-1 p-3 rounded-2xl font-semibold transition-colors bg-green-500 text-white" id="typeExpense">支出</button>
            <button type="button" class="flex-1 p-3 rounded-2xl font-semibold transition-colors bg-gray-100 text-gray-600" id="typeIncome">收入</button>
        </div>
        <input type="hidden" id="billType" value="expense">
        <input type="text" id="desc" placeholder="描述 (例: 午餐)" autocomplete="off" class="w-full p-4 mb-4 border border-gray-100 rounded-2xl text-lg bg-gray-50">
        <input type="number" id="amount" placeholder="金额 (¥)" step="0.01" class="w-full p-4 mb-4 border border-gray-100 rounded-2xl text-lg bg-gray-50">
        <select id="categorySelect" class="w-full p-4 mb-4 border border-gray-100 rounded-2xl text-lg bg-gray-50">
            <option value="餐饮">� 餐饮</option>
            <option value="购物">🛍️ 购物</option>
            <option value="娱乐">🎬 娱乐</option>
            <option value="交通">🚗 交通</option>
            <option value="学习">📚 学习</option>
            <option value="宠物">🐱 宠物</option>
            <option value="其他支出">📦 其他支出</option>
        </select>
        <select id="subCategorySelect" class="w-full p-4 mb-4 border border-gray-100 rounded-2xl text-lg bg-gray-50">
            <option value="正餐">🍽️ 正餐</option>
            <option value="饮品">🥤 饮品</option>
            <option value="零食水果">🍉 零食水果</option>
            <option value="外卖">🍔 外卖</option>
        </select>
        <input type="date" id="date" value="" class="w-full p-4 mb-4 border border-gray-100 rounded-2xl text-lg bg-gray-50">
        <button class="w-full p-4 rounded-2xl bg-pink-500 text-white font-semibold cursor-pointer hover:bg-pink-600 transition-colors" id="saveBtn">保存账单</button>
    </div>

    <!-- 月份筛选 -->
    <div class="bg-white rounded-2xl p-4 mb-6 shadow-sm flex items-center justify-between">
        <span class="font-semibold text-gray-700">📅 历史账单</span>
        <select id="monthFilter" class="p-2 border border-gray-200 rounded-xl bg-gray-50 text-gray-700 cursor-pointer">
            <option value="">全部月份</option>
        </select>
    </div>

    <!-- 账单列表 -->
    <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
        <div class="flex justify-between mb-4">
            <span class="font-semibold text-gray-800">近期账单</span>
            <span class="text-gray-400 text-sm">点击编辑/删除</span>
        </div>
        <div id="billListContainer"></div>
        <div id="emptyMsg" class="text-center py-10 text-gray-400">
            暂无账单，添加一笔吧！
        </div>
    </div>

    <!-- 图表卡片 -->
    <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
        <div class="font-semibold mb-5 text-lg flex items-center gap-2 text-gray-800">
            <i class="fas fa-chart-pie text-pink-500"></i>
            <span>支出构成（按类别）</span>
        </div>
        <div id="pieChart"></div>
    </div>

    <!-- 商店区域 -->
    <div class="bg-white rounded-2xl p-6 shadow-sm mb-20">
        <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center gap-2">
            <i class="fas fa-shopping-cart text-pink-500"></i>
            <span>商店</span>
        </h2>
        <div id="shopItems" class="space-y-3">
            <!-- 动态生成 -->
        </div>
    </div>
</div>

<!-- 编辑模态框 -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-3xl w-[85%] max-w-[350px] p-6 shadow-xl">
        <h3 id="modalTitle" class="text-xl font-semibold mb-5 text-gray-800">编辑账单</h3>
        <div class="flex gap-3 mb-4">
            <button type="button" class="flex-1 p-3 rounded-2xl font-semibold transition-colors bg-green-500 text-white" id="editTypeExpense">支出</button>
            <button type="button" class="flex-1 p-3 rounded-2xl font-semibold transition-colors bg-gray-100 text-gray-600" id="editTypeIncome">收入</button>
        </div>
        <input type="hidden" id="editBillType" value="expense">
        <input type="hidden" id="editBillId">
        <input type="text" id="editDesc" placeholder="描述 (例: 午餐)" autocomplete="off" class="w-full p-4 mb-4 border border-gray-100 rounded-2xl text-lg bg-gray-50">
        <input type="number" id="editAmount" placeholder="金额 (¥)" step="0.01" class="w-full p-4 mb-4 border border-gray-100 rounded-2xl text-lg bg-gray-50">
        <select id="editCategorySelect" class="w-full p-4 mb-4 border border-gray-100 rounded-2xl text-lg bg-gray-50">
            <option value="餐饮">🍜 餐饮</option>
        </select>
        <select id="editSubCategorySelect" class="w-full p-4 mb-4 border border-gray-100 rounded-2xl text-lg bg-gray-50">
            <option value="正餐">🍽️ 正餐</option>
        </select>
        <input type="date" id="editDate" value="" class="w-full p-4 mb-4 border border-gray-100 rounded-2xl text-lg bg-gray-50">
        <div class="flex gap-3">
            <button class="flex-1 p-4 rounded-2xl bg-gray-100 font-semibold cursor-pointer hover:bg-gray-200 transition-colors" id="cancelModal">取消</button>
            <button class="flex-1 p-4 rounded-2xl bg-pink-500 text-white font-semibold cursor-pointer hover:bg-pink-600 transition-colors" id="updateBtn">更新</button>
        </div>
    </div>
</div>

<script>
    // ---------- 数据存储 (localStorage) ----------
    let bills = [];
    let nextId = 1;
    let editingId = null;

    // 游戏化数据 - 喵币系统
    let gameData = {
        coins: 100,
        streakDays: 0,
        lastRecordDate: '',
        todayRewarded: false,
        ownedItems: ['鱼', '小鱼干', '小鱼干'],
        catAffection: 0
    };

    // 商店物品列表
    const shopItemsList = [
        { id: '鱼', name: '鱼', price: 50, icon: '🐟', desc: '美味的鱼' },
        { id: '小鱼干', name: '小鱼干', price: 20, icon: '🐟', desc: '营养小鱼干' },
        { id: '逗猫棒', name: '逗猫棒', price: 30, icon: '🪀', desc: '猫咪的最爱' },
        { id: '猫抓板', name: '猫抓板', price: 80, icon: '🪧', desc: '磨爪神器' },
        { id: '豪华猫爬架', name: '豪华猫爬架', price: 200, icon: '🏰', desc: '猫咪的宫殿' }
    ];

    // 分类配置
    const categories = {
        income: {
            '薪资奖金': ['工资', '奖金', '津贴'],
            '兼职外快': ['家教', '设计', '写作', '跑腿', '其他兼职'],
            '红包礼金': ['生日红包', '节日红包', '婚礼红包'],
            '退款报销': ['退货退款', '医保报销', '其他报销'],
            '其他收入': ['其他收入']
        },
        expense: {
            '餐饮': ['正餐', '饮品', '零食水果', '外卖'],
            '购物': ['服饰', '数码', '日用', '美妆'],
            '娱乐': ['电影', '游戏', '聚会', '旅游'],
            '交通': ['公交地铁', '打车', '加油', '维修'],
            '学习': ['书籍', '课程', '文具'],
            '宠物': ['猫粮', '玩具', '医疗'],
            '其他支出': ['其他支出']
        }
    };

    // 情绪价值话术库
    const emotionMessages = {
        income: [
            '哇，钱包鼓了！💸',
            '你离财富自由又近一步！✨',
            '这笔收入来得真及时！🎉',
            '赚钱小能手，真棒！👏',
            '积累财富的感觉真好！💰'
        ],
        餐饮: [
            '好好吃饭，身体棒棒~ 🍜',
            '美食是生活的调味剂！😋',
            '享受每一顿饭的美好时光~ 🍽️'
        ],
        娱乐: [
            '快乐很重要！享受生活吧~ 🎉',
            '适当放松，充电再出发！⚡',
            '生活需要一点乐趣~ 🎮'
        ],
        学习: [
            '投资自己永远不亏！📚',
            '知识就是力量！💪',
            '学习让你更优秀~ ✨'
        ],
        宠物: [
            '小猫咪谢谢你~ 🐱',
            '宠物是最忠实的伙伴！❤️',
            '照顾宠物的你超有爱心~ 🥰'
        ],
        general: [
            '记账的你超自律！📝',
            '每一笔都清晰，生活更有序！🌟',
            '坚持记账，掌控生活！💪',
            '你的财务状况越来越清晰啦！📊',
            '好习惯正在养成，加油！🔥'
        ]
    };

    // 猫咪反馈话术库
    const catFeedbackMessages = [
        '喵~真好吃！😋',
        '谢谢你，我好幸福～❤️',
        '你是我最好的铲屎官！💕',
        '这个味道真棒！👍',
        '我好喜欢这个！😻',
        '有你真好~ 🥰',
        '谢谢主人～ 😽',
        '我超满足的！✨'
    ];

    // 从localStorage加载数据
    function loadData() {
        const storedBills = localStorage.getItem('bills');
        const storedNextId = localStorage.getItem('nextId');
        if (storedBills) {
            bills = JSON.parse(storedBills);
        } else {
            // 预置至少5条账单（最近一周）
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            const twoDaysAgo = new Date(today);
            twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);
            const twoDaysAgoStr = twoDaysAgo.toISOString().split('T')[0];
            const threeDaysAgo = new Date(today);
            threeDaysAgo.setDate(threeDaysAgo.getDate() - 3);
            const threeDaysAgoStr = threeDaysAgo.toISOString().split('T')[0];

            bills = [
                { id: 1, desc: "工资", amount: 5000, type: "income", category: "薪资奖金", subCategory: "工资", date: threeDaysAgoStr },
                { id: 2, desc: "午餐", amount: 45, type: "expense", category: "餐饮", subCategory: "正餐", date: twoDaysAgoStr },
                { id: 3, desc: "打车", amount: 30, type: "expense", category: "交通", subCategory: "打车", date: twoDaysAgoStr },
                { id: 4, desc: "买书", amount: 89, type: "expense", category: "学习", subCategory: "书籍", date: yesterdayStr },
                { id: 5, desc: "奖金", amount: 1000, type: "income", category: "薪资奖金", subCategory: "奖金", date: todayStr }
            ];
            nextId = 6;
            saveBillData();
        }
        if (storedNextId) {
            nextId = parseInt(storedNextId);
        }

        const storedGameData = localStorage.getItem('gameData');
        if (storedGameData) {
            gameData = { ...gameData, ...JSON.parse(storedGameData) };
        } else {
            saveGameData();
        }

        checkDailyRecord();
    }

    function saveBillData() {
        localStorage.setItem('bills', JSON.stringify(bills));
        localStorage.setItem('nextId', nextId.toString());
    }

    function saveGameData() {
        localStorage.setItem('gameData', JSON.stringify(gameData));
    }

    // 检查每日记账奖励
    function checkDailyRecord() {
        const today = new Date().toISOString().split('T')[0];
        if (gameData.lastRecordDate !== today) {
            if (gameData.lastRecordDate) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];

                if (gameData.lastRecordDate === yesterdayStr) {
                    gameData.streakDays++;
                    if (gameData.streakDays % 3 === 0) {
                        gameData.coins += 20;
                        showEmotionMessage('🎉 连续记账' + gameData.streakDays + '天，奖励20喵币！');
                    }
                } else {
                    gameData.streakDays = 1;
                }
            } else {
                gameData.streakDays = 1;
            }
            gameData.todayRewarded = false;
            gameData.lastRecordDate = today;
            saveGameData();
        }
    }

    // 给予每日首次记账奖励
    function giveDailyReward() {
        if (!gameData.todayRewarded) {
            gameData.coins += 10;
            gameData.todayRewarded = true;
            saveGameData();
            showEmotionMessage('🎉 每日首次记账，奖励10喵币！');
        }
    }

    // 显示情绪提示
    function showEmotionMessage(message) {
        const emotionMessage = document.getElementById('emotionMessage');
        const emotionText = document.getElementById('emotionText');
        emotionText.textContent = message;
        emotionMessage.classList.remove('hidden');
        setTimeout(() => {
            emotionMessage.classList.add('hidden');
        }, 3000);
    }

    // 显示猫咪反馈
    function showCatFeedback(message) {
        const catFeedback = document.getElementById('catFeedback');
        const catFeedbackText = document.getElementById('catFeedbackText');
        catFeedbackText.textContent = message;
        catFeedback.classList.remove('hidden');
        setTimeout(() => {
            catFeedback.classList.add('hidden');
        }, 2000);
    }

    // 随机情绪提示
    function getRandomEmotionMessage(type, category) {
        if (type === 'income') {
            return emotionMessages.income[Math.floor(Math.random() * emotionMessages.income.length)];
        } else if (emotionMessages[category]) {
            const messages = emotionMessages[category];
            return messages[Math.floor(Math.random() * messages.length)];
        } else {
            return emotionMessages.general[Math.floor(Math.random() * emotionMessages.general.length)];
        }
    }

    // 随机猫咪反馈
    function getRandomCatFeedback() {
        return catFeedbackMessages[Math.floor(Math.random() * catFeedbackMessages.length)];
    }

    // 购买物品
    function purchaseItem(itemId) {
        const item = shopItemsList.find(i => i.id === itemId);
        if (!item) return;

        if (gameData.coins < item.price) {
            showEmotionMessage('💰 喵币不足，无法购买！');
            return;
        }

        gameData.coins -= item.price;
        gameData.ownedItems.push(itemId);
        saveGameData();

        updateCoinsDisplay();
        renderHouseItems();
        renderShopItems();

        showEmotionMessage(`🎉 购买「${item.name}」成功！`);
    }

    // 更新喵币显示
    function updateCoinsDisplay() {
        document.getElementById('totalCoins').textContent = gameData.coins;
    }

    // 渲染房屋物品
    function renderHouseItems() {
        const container = document.getElementById('houseItems');
        container.innerHTML = '';

        const itemCounts = {};
        gameData.ownedItems.forEach(itemId => {
            itemCounts[itemId] = (itemCounts[itemId] || 0) + 1;
        });

        Object.entries(itemCounts).forEach(([itemId, count]) => {
            const item = shopItemsList.find(i => i.id === itemId);
            if (item) {
                const div = document.createElement('div');
                div.className = 'p-3 bg-gray-50 rounded-2xl text-center cursor-pointer hover:bg-gray-100 transition-colors';
                div.dataset.itemId = itemId;
                div.innerHTML = `
                    <div class="text-2xl mb-1">${item.icon}</div>
                    <div class="font-medium text-sm">${item.name}</div>
                    <div class="text-xs text-gray-500">×${count}</div>
                `;
                container.appendChild(div);

                // 添加点击事件
                div.addEventListener('click', () => {
                    selectItemToFeed(itemId);
                });
            }
        });
    }

    // 渲染商店物品
    function renderShopItems() {
        const container = document.getElementById('shopItems');
        container.innerHTML = '';

        shopItemsList.forEach(item => {
            const div = document.createElement('div');
            div.className = 'flex justify-between items-center p-4 bg-gray-50 rounded-2xl';
            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-3xl">${item.icon}</span>
                    <div>
                        <div class="font-semibold">${item.name}</div>
                        <div class="text-sm text-gray-500">${item.desc}</div>
                    </div>
                </div>
                <button class="px-4 py-2 rounded-xl bg-pink-500 text-white font-semibold hover:bg-pink-600 transition-colors" onclick="purchaseItem('${item.id}')">
                    ${item.price} 喵币
                </button>
            `;
            container.appendChild(div);
        });
    }

    // 选择要喂的物品
    let selectedItemToFeed = null;

    function selectItemToFeed(itemId) {
        selectedItemToFeed = itemId;
        showEmotionMessage('点击猫咪开始喂食～');
    }

    // 喂猫功能
    function feedCat() {
        if (!selectedItemToFeed) {
            showEmotionMessage('请先选择要喂的道具～');
            return;
        }

        if (selectedItemToFeed === '鱼' || selectedItemToFeed === '小鱼干') {
            const itemIndex = gameData.ownedItems.indexOf(selectedItemToFeed);
            if (itemIndex === -1) {
                showEmotionMessage('🐱 没有这个道具了，去商店买吧～');
                return;
            }
            gameData.ownedItems.splice(itemIndex, 1);
            gameData.catAffection += 1;
            saveGameData();
            renderHouseItems();
            document.getElementById('catAffection').textContent = gameData.catAffection;
            
            showCatFeedback(getRandomCatFeedback());
        } else {
            showEmotionMessage('🐱 这个不能吃哦！');
        }
        selectedItemToFeed = null;
    }

    // 动态更新二级分类
    function updateSubCategories(type, categorySelectId, subCategorySelectId) {
        const typeValue = type || document.getElementById('billType').value;
        const categorySelect = document.getElementById(categorySelectId);
        const subCategorySelect = document.getElementById(subCategorySelectId);
        const selectedCategory = categorySelect.value;

        subCategorySelect.innerHTML = '';
        const subCategories = categories[typeValue][selectedCategory] || [];
        subCategories.forEach(sub => {
            const option = document.createElement('option');
            option.value = sub;
            option.textContent = sub;
            subCategorySelect.appendChild(option);
        });
    }

    // DOM 元素
    const totalIncomeSpan = document.getElementById('totalIncome');
    const totalExpenseSpan = document.getElementById('totalExpense');
    const balanceSpan = document.getElementById('balance');
    const billListContainer = document.getElementById('billListContainer');
    const emptyMsg = document.getElementById('emptyMsg');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const descInput = document.getElementById('desc');
    const amountInput = document.getElementById('amount');
    const categorySelect = document.getElementById('categorySelect');
    const subCategorySelect = document.getElementById('subCategorySelect');
    const dateInput = document.getElementById('date');
    const saveBtn = document.getElementById('saveBtn');
    const typeExpenseBtn = document.getElementById('typeExpense');
    const typeIncomeBtn = document.getElementById('typeIncome');
    const billTypeInput = document.getElementById('billType');
    const monthFilter = document.getElementById('monthFilter');
    const cat = document.getElementById('cat');

    // 编辑模态框元素
    const editModal = document.getElementById('modal');
    const editTypeExpense = document.getElementById('editTypeExpense');
    const editTypeIncome = document.getElementById('editTypeIncome');
    const editBillType = document.getElementById('editBillType');
    const editBillId = document.getElementById('editBillId');
    const editDesc = document.getElementById('editDesc');
    const editAmount = document.getElementById('editAmount');
    const editCategorySelect = document.getElementById('editCategorySelect');
    const editSubCategorySelect = document.getElementById('editSubCategorySelect');
    const editDate = document.getElementById('editDate');
    const cancelModal = document.getElementById('cancelModal');
    const updateBtn = document.getElementById('updateBtn');

    let pieChart = null;

    // 获取统计信息
    function getStats() {
        const totalIncome = bills.filter(b => b.type === 'income').reduce((sum, b) => sum + b.amount, 0);
        const totalExpense = bills.filter(b => b.type === 'expense').reduce((sum, b) => sum + b.amount, 0);
        return { totalIncome, totalExpense, balance: totalIncome - totalExpense };
    }

    // 更新UI
    function refreshUI() {
        const { totalIncome, totalExpense, balance } = getStats();
        totalIncomeSpan.textContent = totalIncome.toLocaleString();
        totalExpenseSpan.textContent = totalExpense.toLocaleString();
        balanceSpan.textContent = balance.toLocaleString();

        updateCoinsDisplay();
        updateMonthFilter();
        renderBillList();
        updateChart();
    }

    // 更新月份筛选器
    function updateMonthFilter() {
        const months = [...new Set(bills.map(b => b.date.substring(0, 7)))].sort().reverse();
        const currentValue = monthFilter.value;
        monthFilter.innerHTML = '<option value="">全部月份</option>';
        months.forEach(month => {
            const option = document.createElement('option');
            option.value = month;
            option.textContent = month;
            monthFilter.appendChild(option);
        });
        monthFilter.value = currentValue;
    }

    // 渲染账单列表
    function renderBillList() {
        let filteredBills = [...bills].sort((a, b) => new Date(b.date) - new Date(a.date));
        
        if (monthFilter.value) {
            filteredBills = filteredBills.filter(b => b.date.startsWith(monthFilter.value));
        }

        if (filteredBills.length === 0) {
            billListContainer.innerHTML = '';
            emptyMsg.classList.remove('hidden');
        } else {
            emptyMsg.classList.add('hidden');
            billListContainer.innerHTML = filteredBills.map(bill => `
                <div class="bill-item flex justify-between items-center p-4 border-b border-gray-50 cursor-pointer transition-colors rounded-xl mb-2" onclick="openEditModal(${bill.id})">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg ${bill.type === 'income' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                            ${getCategoryIcon(bill.category)}
                        </div>
                        <div>
                            <div class="font-medium text-gray-800">${bill.desc}</div>
                            <div class="text-sm text-gray-400">${bill.date} · ${bill.category} · ${bill.subCategory}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-semibold ${bill.type === 'income' ? 'text-green-600' : 'text-red-500'}">${bill.type === 'income' ? '+' : '-'}${bill.amount.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }
    }

    function getCategoryIcon(category) {
        const icons = {
            '薪资奖金': '💰', '兼职外快': '💼', '红包礼金': '🎁', '退款报销': '🔄', '其他收入': '📈',
            '餐饮': '🍜', '购物': '🛍️', '娱乐': '🎬', '交通': '🚗', '学习': '📚', '宠物': '🐱', '其他支出': '📦'
        };
        return icons[category] || '📦';
    }

    // 更新图表
    function updateChart() {
        const expenseBills = bills.filter(b => b.type === 'expense');
        const categoryTotals = {};
        expenseBills.forEach(bill => {
            categoryTotals[bill.category] = (categoryTotals[bill.category] || 0) + bill.amount;
        });

        const categories = Object.keys(categoryTotals);
        const data = categories.map(cat => ({
            name: cat + ' ' + getCategoryIcon(cat),
            value: categoryTotals[cat]
        }));

        if (!pieChart) {
            pieChart = echarts.init(document.getElementById('pieChart'));
        }

        const option = {
            tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
            legend: { bottom: '5%', left: 'center' },
            color: ['#f472b6', '#fb923c', '#fbbf24', '#a3e635', '#34d399', '#22d3ee', '#818cf8', '#c084fc'],
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
                label: { show: false },
                emphasis: { label: { show: true, fontSize: 14 } },
                data: data
            }]
        };

        pieChart.setOption(option);
    }

    // 保存账单
    function saveBill() {
        const desc = descInput.value.trim();
        const amount = parseFloat(amountInput.value);
        const category = categorySelect.value;
        const subCategory = subCategorySelect.value;
        const date = dateInput.value;
        const type = billTypeInput.value;

        if (!desc) { showEmotionMessage('请输入描述'); return; }
        if (isNaN(amount) || amount <= 0) { showEmotionMessage('请输入有效金额'); return; }
        if (!date) { showEmotionMessage('请选择日期'); return; }

        giveDailyReward();

        bills.push({ id: nextId++, desc, amount, type, category, subCategory, date });
        showEmotionMessage(getRandomEmotionMessage(type, category));

        saveBillData();
        refreshUI();
        
        // 重置表单
        descInput.value = '';
        amountInput.value = '';
        dateInput.value = new Date().toISOString().split('T')[0];
    }

    // 打开编辑模态框
    function openEditModal(id) {
        const bill = bills.find(b => b.id === id);
        if (!bill) return;

        editingId = id;
        editBillId.value = id;
        editDesc.value = bill.desc;
        editAmount.value = bill.amount;
        editBillType.value = bill.type;
        editDate.value = bill.date;

        // 更新分类选项
        updateEditCategoryOptions(bill.type);
        editCategorySelect.value = bill.category;
        updateSubCategories(bill.type, 'editCategorySelect', 'editSubCategorySelect');
        editSubCategorySelect.value = bill.subCategory;

        if (bill.type === 'income') {
            editTypeIncome.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-green-500 text-white';
            editTypeExpense.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-gray-100 text-gray-600';
        } else {
            editTypeExpense.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-green-500 text-white';
            editTypeIncome.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-gray-100 text-gray-600';
        }

        modal.classList.remove('hidden');
    }

    // 更新编辑模态框分类选项
    function updateEditCategoryOptions(type) {
        const categorySelect = document.getElementById('editCategorySelect');
        categorySelect.innerHTML = '';

        Object.keys(categories[type]).forEach(category => {
            const option = document.createElement('option');
            option.value = category;
            option.textContent = getCategoryIcon(category) + ' ' + category;
            categorySelect.appendChild(option);
        });
    }

    // 关闭编辑模态框
    function closeEditModal() {
        modal.classList.add('hidden');
        editingId = null;
    }

    // 更新账单
    function updateBill() {
        const id = parseInt(editBillId.value);
        const desc = editDesc.value.trim();
        const amount = parseFloat(editAmount.value);
        const category = editCategorySelect.value;
        const subCategory = editSubCategorySelect.value;
        const date = editDate.value;
        const type = editBillType.value;

        if (!desc) { showEmotionMessage('请输入描述'); return; }
        if (isNaN(amount) || amount <= 0) { showEmotionMessage('请输入有效金额'); return; }
        if (!date) { showEmotionMessage('请选择日期'); return; }

        const index = bills.findIndex(b => b.id === id);
        if (index !== -1) {
            bills[index] = { ...bills[index], desc, amount, type, category, subCategory, date };
            saveBillData();
            refreshUI();
            closeEditModal();
            showEmotionMessage('🎉 账单更新成功！');
        }
    }

    // 删除账单
    function deleteBill(id) {
        if (!confirm('确定删除这条账单吗？')) return;
        bills = bills.filter(b => b.id !== id);
        saveBillData();
        refreshUI();
        showEmotionMessage('🗑️ 账单已删除');
    }

    // 事件绑定
    saveBtn.addEventListener('click', saveBill);
    cancelModal.addEventListener('click', closeEditModal);
    updateBtn.addEventListener('click', updateBill);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeEditModal(); });
    monthFilter.addEventListener('change', renderBillList);
    categorySelect.addEventListener('change', () => updateSubCategories(null, 'categorySelect', 'subCategorySelect'));
    editCategorySelect.addEventListener('change', () => updateSubCategories(editBillType.value, 'editCategorySelect', 'editSubCategorySelect'));

    typeExpenseBtn.addEventListener('click', () => {
        billTypeInput.value = 'expense';
        typeExpenseBtn.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-green-500 text-white';
        typeIncomeBtn.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-gray-100 text-gray-600';
        // 更新分类选项
        categorySelect.innerHTML = '';
        Object.keys(categories.expense).forEach(category => {
            const option = document.createElement('option');
            option.value = category;
            option.textContent = getCategoryIcon(category) + ' ' + category;
            categorySelect.appendChild(option);
        });
        updateSubCategories('expense', 'categorySelect', 'subCategorySelect');
    });

    typeIncomeBtn.addEventListener('click', () => {
        billTypeInput.value = 'income';
        typeIncomeBtn.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-green-500 text-white';
        typeExpenseBtn.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-gray-100 text-gray-600';
        // 更新分类选项
        categorySelect.innerHTML = '';
        Object.keys(categories.income).forEach(category => {
            const option = document.createElement('option');
            option.value = category;
            option.textContent = getCategoryIcon(category) + ' ' + category;
            categorySelect.appendChild(option);
        });
        updateSubCategories('income', 'categorySelect', 'subCategorySelect');
    });

    editTypeExpense.addEventListener('click', () => {
        editBillType.value = 'expense';
        editTypeExpense.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-green-500 text-white';
        editTypeIncome.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-gray-100 text-gray-600';
        updateEditCategoryOptions('expense');
        updateSubCategories('expense', 'editCategorySelect', 'editSubCategorySelect');
    });

    editTypeIncome.addEventListener('click', () => {
        editBillType.value = 'income';
        editTypeIncome.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-green-500 text-white';
        editTypeExpense.className = 'flex-1 p-3 rounded-2xl font-semibold transition-colors bg-gray-100 text-gray-600';
        updateEditCategoryOptions('income');
        updateSubCategories('income', 'editCategorySelect', 'editSubCategorySelect');
    });

    // 猫咪点击事件
    cat.addEventListener('click', feedCat);

    window.addEventListener('resize', () => { if (pieChart) pieChart.resize(); });

    // 初始化
    loadData();
    refreshUI();
    renderHouseItems();
    renderShopItems();
    document.getElementById('catAffection').textContent = gameData.catAffection;
    dateInput.value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
